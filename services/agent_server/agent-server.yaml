server:
  host: '0.0.0.0'
  port: 8000

llm:
  type: openai
  model: gpt-4o
  base_url: https://api.openai.com/v1
  api_key: ${OPENAI_API_KEY}

session:
  max_tool_rounds: 10
  tool_timeout_sec: 30
  history_max_messages: 50

auth:
  db_url: 'sqlite+aiosqlite:///tokens.db'

plugin:
  external_dirs:
    - '/plugins'
